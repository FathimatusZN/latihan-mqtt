# ============================================================
#  FILE    : docker/nginx.conf
#  FUNGSI  : Konfigurasi Nginx untuk frontend dashboard
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls ke backend (hindari CORS issue di production)
    # Frontend bisa pakai /api/logs → diteruskan ke backend:8000/logs
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}